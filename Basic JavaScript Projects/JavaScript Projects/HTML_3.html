<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Data Attribute Example</title>
    <script src="JavaScript/JavaScript_3.js" defer></script>
</head>

<body>

    <h2>Favorite Cars</h2>

    <p data-car="Tesla Model S" class="carItem">Electric luxury sedan</p>
    <p data-car="Ford Mustang" class="carItem">Classic American muscle</p>
    <p data-car="Toyota Supra" class="carItem">Iconic Japanese sports car</p>

    <button onclick="showCar()">Show Selected Car</button>

    <p id="Output"></p>

</body>
</html>
