<!DOCTYPE html>
<html>
<head>
    <!-- Load the jQuery library from Google's CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
</head>

<script>
    // Wait until the entire document is loaded before running jQuery code
    $(document).ready(function () {

        // Append new HTML content to the <html> element
        $("html").append(
            "<body>\
                <div id='container'>\
                    <div id='inner'>\
                        <h1>Basic jQuery</h1>\
                        <p id='1'>Paragraph 1</p>\
                        <p id='2'>Paragraph 2</p>\
                        <p id='3'>Paragraph 3</p>\
                    </div>\
                </div>\
            </body>"
        );

        // Add CSS styling to the paragraph with id="2"
        $("#2").css({ "color": "red" });

        // When the paragraph with id="3" is clicked, hide the <h1> element
        $("#3").click(function () {
            $("h1").hide();
        });
    });
</script>
</html>
